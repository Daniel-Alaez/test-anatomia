function letter(n){return ["A","B","C","D"][n];}
function renderPage(){quiz.innerHTML=""; const totalPages=Math.ceil(QUESTIONS.length/PER_PAGE); const start=(currentPage-1)*PER_PAGE; const end=Math.min(start+PER_PAGE,QUESTIONS.length); progressPill.textContent=`Página ${currentPage} de ${totalPages} · Preguntas ${start+1}-${end}`; pageIndicator.textContent=`${currentPage} / ${totalPages}`; answeredPill.textContent=`Respondidas: ${userAnswers.filter(v=>v!==null).length} / ${QUESTIONS.length}`;
for(let i=start;i<end;i++){const q=QUESTIONS[i]; const wrapper=document.createElement("article"); wrapper.className="question"; const title=document.createElement("h3"); title.textContent=q.q; wrapper.appendChild(title); const options=document.createElement("div"); options.className="options";
q.options.forEach((opt,idx)=>{const label=document.createElement("label"); label.className="option"; const input=document.createElement("input"); input.type="radio"; input.name=`q_${i}`; input.value=idx; input.checked=userAnswers[i]===idx; input.addEventListener("change",()=>{userAnswers[i]=idx; answeredPill.textContent=`Respondidas: ${userAnswers.filter(v=>v!==null).length} / ${QUESTIONS.length}`;}); if(corrected){if(idx===q.answer) label.classList.add("correct"); if(userAnswers[i]===idx && idx!==q.answer) label.classList.add("incorrect");} label.appendChild(input); label.append(document.createTextNode(letter(idx)+") "+opt)); options.appendChild(label);});
wrapper.appendChild(options); if(corrected){const fb=document.createElement("div"); if(userAnswers[i]===q.answer){fb.className="feedback ok"; fb.textContent="✔ Correcta";} else {fb.className="feedback bad"; const selected=userAnswers[i]===null ? "Sin responder" : letter(userAnswers[i]); fb.textContent=`✘ Incorrecta · Tu respuesta: ${selected} · Correcta: ${letter(q.answer)}`;} wrapper.appendChild(fb);} quiz.appendChild(wrapper);}
document.getElementById("btnPrev").disabled=currentPage===1; document.getElementById("btnNext").disabled=currentPage===Math.ceil(QUESTIONS.length/PER_PAGE);}
function correctTest(showOnlyAnswers=false){corrected=true; let correct=0, wrong=0, blank=0; QUESTIONS.forEach((q,i)=>{if(userAnswers[i]===null) blank++; else if(userAnswers[i]===q.answer) correct++; else wrong++;}); const scoreOver10=((correct/QUESTIONS.length)*10).toFixed(2); resultBox.style.display="block"; scoreText.textContent=`Resultado: ${correct} aciertos · ${wrong} fallos · ${blank} en blanco · Nota: ${scoreOver10} / 10`; summaryText.textContent=showOnlyAnswers ? "Se han mostrado las soluciones de todo el test." : `Has respondido ${QUESTIONS.length-blank} de ${QUESTIONS.length} preguntas.`; renderPage(); window.scrollTo({top:0,behavior:"smooth"});}
function resetTest(){if(!confirm("¿Seguro que quieres reiniciar todo el test?")) return; for(let i=0;i<userAnswers.length;i++) userAnswers[i]=null; corrected=false; currentPage=1; resultBox.style.display="none"; renderPage(); window.scrollTo({top:0,behavior:"smooth"});}
document.getElementById("btnPrev").addEventListener("click",()=>{if(currentPage>1){currentPage--; renderPage(); window.scrollTo({top:0,behavior:"smooth"});}});
document.getElementById("btnNext").addEventListener("click",()=>{const totalPages=Math.ceil(QUESTIONS.length/PER_PAGE); if(currentPage<totalPages){currentPage++; renderPage(); window.scrollTo({top:0,behavior:"smooth"});}});
document.getElementById("btnCorrect").addEventListener("click",()=>correctTest(false));
document.getElementById("btnShowAnswers").addEventListener("click",()=>correctTest(true));
document.getElementById("btnReset").addEventListener("click",resetTest);
renderPage();
</script>
</body>
</html>
