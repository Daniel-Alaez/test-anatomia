<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Anatomía 1º Enfermería - 250 preguntas</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --ok: #15803d;
      --bad: #b91c1c;
      --border: #dbe3f0;
      --shadow: 0 10px 30px rgba(30, 41, 59, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 240px);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 16px;
    }
    .left-tools, .right-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button {
      border: 0;
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: .15s ease;
    }
    button:hover { background: var(--primary-2); transform: translateY(-1px); }
    button.secondary {
      background: #e5eefc;
      color: #1e3a8a;
    }
    button.secondary:hover { background: #dbe7ff; }
    button.ghost {
      background: #edf2f7;
      color: #334155;
    }
    button.ghost:hover { background: #e2e8f0; }
    button:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none !important;
    }
    .pill {
      background: white;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 600;
    }
    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 12px;
    }
    .question {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin: 12px 0;
      background: #fff;
    }
    .question h3 {
      margin: 0 0 12px;
      font-size: 1.03rem;
      line-height: 1.45;
    }
    .options {
      display: grid;
      gap: 10px;
    }
    .option {
      display: block;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: .15s ease;
      background: #fbfdff;
    }
    .option:hover { border-color: #b8c9e6; background: #f7fbff; }
    .option input { margin-right: 10px; }
    .option.correct {
      border-color: #86efac;
      background: #f0fdf4;
    }
    .option.incorrect {
      border-color: #fecaca;
      background: #fef2f2;
    }
    .feedback {
      margin-top: 12px;
      font-size: .95rem;
      font-weight: 700;
    }
    .feedback.ok { color: var(--ok); }
    .feedback.bad { color: var(--bad); }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .result {
      display: none;
      margin-top: 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .score {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .muted { color: var(--muted); }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
    }
    @media (max-width: 720px) {
      h1 { font-size: 1.55rem; }
      .hero, .quiz-card, .result { border-radius: 16px; }
      button { width: 100%; }
      .left-tools, .right-tools { width: 100%; }
      .pill { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Test Anatomía · 1º Enfermería</h1>
      <p class="sub">
        Banco de <strong>250 preguntas tipo test</strong> con corrección automática y navegación por páginas.
      </p>
      <div class="toolbar">
        <div class="left-tools">
          <span class="pill" id="progressPill">Página 1 de 13 · Preguntas 1-20</span>
          <span class="pill" id="answeredPill">Respondidas: 0 / 250</span>
        </div>
        <div class="right-tools">
          <button class="secondary" id="btnCorrect">Corregir test</button>
          <button class="ghost" id="btnShowAnswers">Mostrar soluciones</button>
          <button class="ghost" id="btnReset">Reiniciar</button>
        </div>
      </div>
    </section>

    <section class="quiz-card">
      <div id="quiz"></div>
      <div class="pagination">
        <button class="secondary" id="btnPrev">← Anterior</button>
        <span class="pill" id="pageIndicator">1 / 13</span>
        <button class="secondary" id="btnNext">Siguiente →</button>
      </div>
    </section>

    <section class="result" id="resultBox">
      <div class="score" id="scoreText"></div>
      <div class="muted" id="summaryText"></div>
      <div class="footer-note">
        Las respuestas quedan guardadas mientras no pulses <strong>“Reiniciar”</strong>.
      </div>
    </section>
  </div>

    const PER_PAGE = 20;
    let currentPage = 1;
    let corrected = false;
    const userAnswers = Array(QUESTIONS.length).fill(null);

    const quiz = document.getElementById("quiz");
    const progressPill = document.getElementById("progressPill");
    const answeredPill = document.getElementById("answeredPill");
    const pageIndicator = document.getElementById("pageIndicator");
    const resultBox = document.getElementById("resultBox");
    const scoreText = document.getElementById("scoreText");
    const summaryText = document.getElementById("summaryText");

    function letter(n) {
      return ["A", "B", "C", "D"][n];
    }

    function renderPage() {
      quiz.innerHTML = "";
      const totalPages = Math.ceil(QUESTIONS.length / PER_PAGE);
      const start = (currentPage - 1) * PER_PAGE;
      const end = Math.min(start + PER_PAGE, QUESTIONS.length);

      progressPill.textContent = `Página ${currentPage} de ${totalPages} · Preguntas ${start + 1}-${end}`;
      pageIndicator.textContent = `${currentPage} / ${totalPages}`;
      answeredPill.textContent = `Respondidas: ${userAnswers.filter(v => v !== null).length} / ${QUESTIONS.length}`;

      for (let i = start; i < end; i++) {
        const q = QUESTIONS[i];
        const wrapper = document.createElement("article");
        wrapper.className = "question";

        const title = document.createElement("h3");
        title.textContent = q.q;
        wrapper.appendChild(title);

        const options = document.createElement("div");
        options.className = "options";

        q.options.forEach((opt, idx) => {
          const label = document.createElement("label");
          label.className = "option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = `q_${i}`;
          input.value = idx;
          input.checked = userAnswers[i] === idx;
          input.addEventListener("change", () => {
            userAnswers[i] = idx;
            answeredPill.textContent = `Respondidas: ${userAnswers.filter(v => v !== null).length} / ${QUESTIONS.length}`;
          });

          if (corrected) {
            if (idx === q.answer) label.classList.add("correct");
            if (userAnswers[i] === idx && idx !== q.answer) label.classList.add("incorrect");
          }

          label.appendChild(input);
          label.append(document.createTextNode(letter(idx) + ") " + opt));
          options.appendChild(label);
        });

        wrapper.appendChild(options);

        if (corrected) {
          const fb = document.createElement("div");
          if (userAnswers[i] === q.answer) {
            fb.className = "feedback ok";
            fb.textContent = "✔ Correcta";
          } else {
            fb.className = "feedback bad";
            const selected = userAnswers[i] === null ? "Sin responder" : letter(userAnswers[i]);
            fb.textContent = `✘ Incorrecta · Tu respuesta: ${selected} · Correcta: ${letter(q.answer)}`;
          }
          wrapper.appendChild(fb);
        }

        quiz.appendChild(wrapper);
      }

      document.getElementById("btnPrev").disabled = currentPage === 1;
      document.getElementById("btnNext").disabled = currentPage === totalPages;
    }

    function correctTest(showOnlyAnswers = false) {
      corrected = true;
      const answered = userAnswers.filter(v => v !== null).length;
      let correct = 0;
      let wrong = 0;
      let blank = 0;

      QUESTIONS.forEach((q, i) => {
        if (userAnswers[i] === null) blank++;
        else if (userAnswers[i] === q.answer) correct++;
        else wrong++;
      });

      const scoreOver10 = ((correct / QUESTIONS.length) * 10).toFixed(2);

      resultBox.style.display = "block";
      scoreText.textContent = `Resultado: ${correct} aciertos · ${wrong} fallos · ${blank} en blanco · Nota: ${scoreOver10} / 10`;
      summaryText.textContent = showOnlyAnswers
        ? "Se han mostrado las soluciones de todo el test."
        : `Has respondido ${answered} de ${QUESTIONS.length} preguntas.`;

      renderPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetTest() {
      if (!confirm("¿Seguro que quieres reiniciar todo el test?")) return;
      for (let i = 0; i < userAnswers.length; i++) userAnswers[i] = null;
      corrected = false;
      currentPage = 1;
      resultBox.style.display = "none";
      renderPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("btnPrev").addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    document.getElementById("btnNext").addEventListener("click", () => {
      const totalPages = Math.ceil(QUESTIONS.length / PER_PAGE);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    document.getElementById("btnCorrect").addEventListener("click", () => correctTest(false));
    document.getElementById("btnShowAnswers").addEventListener("click", () => correctTest(true));
    document.getElementById("btnReset").addEventListener("click", resetTest);

    renderPage();
  </script>
